name: sisgeo
description: "Your new database center for roads!"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  #FIREBASE
  firebase_core: ^3.13.0 #1.17.1 #1.10.0 #^0.4.5
  firebase_storage: ^12.4.5 #10.2.17 #10.1.0 #8.0.0 #^3.1.6 #Armazenamento de arquivos no firebase
  firebase_auth: ^5.5.2 #3.3.19 #3.3.3 #1.0.0 #^0.16.1 #Autenticação do usuário via firebase
  cloud_firestore: ^5.6.8 #5.6.6 #3.1.17 #3.1.0 #1.0.0 #^0.13.7 #Armazenamento de de dados no firebase

  #CONECTORES
  bloc_pattern: ^3.0.1 #3.0.0 #2.5.1 #^1.5.2 #Cria blocos para fazer o screens.common.login do usuario com seguranca
  rxdart: ^0.28.0 #0.26.0 #^0.25.0 #Streams e futures
  scoped_model: ^2.0.0 #1.1.0 #Permite que eu acesse os dados do usuario em qualquer pagina
  #flutter_modular: ^6.3.2

  #LOCALIZAÇÃO
  geolocator: ^13.0.4 #8.0.0 #^7.7.1 #7.0.0 #6.2.1 #Recupera os ads no mapa
  #geocoder2: ^1.4.0

  #DRAW
  image_picker: ^1.1.2 #0.8.4+4 #0.7.0 #^0.6.7+22 #Recupera imagem da camera e galeria
  fl_chart: ^0.63.0

  cpf_cnpj_validator: ^2.0.0 #^1.0.5 #Validador de CPF e CNPJ
  brasil_fields: 1.15.0 #1.0.0 #0.6.1 #Adaptar valores para o formato de moeda brasileira
  diacritic: ^0.1.3

  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  datetime_picker_formfield: 2.0.0 #1.0.0 #Formulário de input tipo date

  flutter_map: ^6.2.1
  #geojson: ^1.0.0
  latlong2: ^0.9.1
  flutter_map_tappable_polyline: ^6.0.0
  flutter_map_cancellable_tile_provider: ^1.0.0



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/roads/all-roads.geojson
    - assets/logos/deral/logo-deral.png
    - assets/images/default_avatar.png

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
