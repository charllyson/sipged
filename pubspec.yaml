name: sipged
description: "Your new database center for roads!"
publish_to: 'none'
version: 1.0.1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  # =========================
  # Flutter (base + i18n)
  # =========================
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # =========================
  # Estado / Injeção / Arquitetura
  # =========================
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.7
  rxdart: ^0.28.0
  provider: ^6.1.5
  bloc_pattern: ^3.0.1
  meta: ^1.17.0
  collection: ^1.19.1

  # =========================
  # Firebase (core, auth, db, storage)
  # =========================
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0

  # =========================
  # Persistência local / Preferências
  # =========================
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5

  # =========================
  # Bluetooth / QR
  # =========================
  flutter_blue_plus: ^1.31.16
  flutter_web_bluetooth: ^1.1.0
  qr_flutter: ^4.1.0

  # =========================
  # Rede / APIs / Parsing
  # =========================
  dio: ^5.9.0
  http: ^1.2.2
  archive: ^3.6.1
  xml: ^6.6.1
  web: ^1.1.1

  # =========================
  # Datas / Internacionalização
  # =========================
  intl: ^0.20.2

  # =========================
  # Geolocalização / Coordenadas
  # =========================
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  latlong2: ^0.9.1

  # =========================
  # Mapas / WebView / Interações
  # =========================
  flutter_map: ^8.2.1
  flutter_map_marker_cluster_plus: ^1.4.2
  webview_flutter: ^4.13.0
  pointer_interceptor: ^0.10.1+2
  flutter_dotenv: ^6.0.0
  weather: ^3.2.1
  vector_math: ^2.2.0

  # =========================
  # Gráficos / Indicadores
  # =========================
  fl_chart: ^1.0.0
  percent_indicator: ^4.2.3

  # =========================
  # PDF (visualização + geração + impressão)
  # =========================
  syncfusion_flutter_pdfviewer: ^32.2.4
  pdfx: ^2.6.0
  pdf: ^3.11.0
  printing: ^5.13.4

  # =========================
  # Arquivos / Imagens / Câmera / EXIF
  # =========================
  file_picker: ^10.2.0
  image_picker: ^1.2.0
  camera: ^0.11.3+1
  exif: ^3.3.0
  native_exif: ^0.7.0
  flutter_image_compress: ^2.4.0
  extended_image: ^10.0.1
  image: ^4.3.0
  image_editor: ^1.5.1

  # =========================
  # UI / Animações
  # =========================
  shimmer: ^3.0.0

  # =========================
  # Input / Máscaras / Validações BR
  # =========================
  flutter_multi_formatter: ^2.9.0
  mask_text_input_formatter: ^2.4.0
  cpf_cnpj_validator: ^2.0.0
  brasil_fields: ^1.18.0
  diacritic: ^0.1.3

  # =========================
  # Date input (legado)
  # =========================
  datetime_picker_formfield: 2.0.1

  # =========================
  # Utilidades / Integrações
  # =========================
  excel: ^4.0.6
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/default_avatar.png
    - assets/logos/sipged/sipged.png
    - assets/logos/sipged/sipged-mono.png
    - .env