<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>IFC Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background: #000;
        }
        #viewer-container {
            width: 100%;
            height: 100%;
            background: #000;
        }
    </style>
</head>
<body>
<div id="viewer-container"></div>

<script>
    window.addEventListener('message', async (event) => {
        if (!event.data || !event.data.type) return;

        if (event.data.type === 'load-ifc-base64') {
            const { base64, filename } = event.data;
            window.__loadIfc(base64, filename);
        }
    });
</script>

<script type="module">
    import { IfcViewerAPI } from "https://cdn.jsdelivr.net/npm/web-ifc-viewer@latest/dist/IFC.js";
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js";

    const container = document.getElementById('viewer-container');

    const viewer = new IfcViewerAPI({
        container,
        backgroundColor: new THREE.Color(0x111111),
    });

    viewer.IFC.setWasmPath("/wasm/");
    viewer.axes.setAxes();
    viewer.grid.setGrid();

    window.__loadIfc = async (base64, filename) => {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        const blob = new Blob([bytes], { type: 'application/octet-stream' });
        const url = URL.createObjectURL(blob);

        const model = await viewer.IFC.loadIfcUrl(url);
        viewer.context.ifcCamera.fitModelToFrame();
    };
</script>
</body>
</html>
