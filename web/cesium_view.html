<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>CesiumJS - SIGED (Free)</title>

    <!-- CesiumJS (somente a lib, sem Ion premium) -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet"/>

    <style>
        html, body, #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }
    </style>
</head>

<body>
<div id="cesiumContainer"></div>

<script>
    let viewer = null;
    let VIEW_ID = null;
    let CFG = { lon: 0, lat: 0, height: 3_000_000.0 };
    let MARKERS = [];

    const pinBuilder = new Cesium.PinBuilder();

    function createViewerIfNeeded() {
        if (viewer) return viewer;

        viewer = new Cesium.Viewer("cesiumContainer", {
            animation: false,
            timeline: false,
            fullscreenButton: false,
            geocoder: false,
            sceneModePicker: false,
            baseLayerPicker: false,
            navigationHelpButton: false,
            homeButton: true,
            infoBox: true,
            selectionIndicator: true,
        });

        // 🔓 NADA de Ion aqui
        // Cesium.Ion.defaultAccessToken = "";

        // --- Camada de mapa totalmente grátis (OpenStreetMap) ---------------
        viewer.imageryLayers.removeAll();
        viewer.imageryLayers.addImageryProvider(
            new Cesium.OpenStreetMapImageryProvider({
                url: "https://a.tile.openstreetmap.org/"
            })
        );

        // Terreno plano gratuito
        viewer.terrainProvider = new Cesium.EllipsoidTerrainProvider();

        viewer.scene.globe.show = true;
        viewer.scene.globe.enableLighting = true;
        viewer.scene.globe.showGroundAtmosphere = true;
        viewer.scene.skyAtmosphere.show = true;
        viewer.scene.skyBox.show = true;
        viewer.scene.highDynamicRange = true;
        viewer.scene.globe.depthTestAgainstTerrain = false;
        viewer.scene.backgroundColor = new Cesium.Color(0.0, 0.0, 0.0, 1.0);

        // Clique em marcador → manda pro Flutter
        const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
        handler.setInputAction(function (click) {
            const picked = viewer.scene.pick(click.position);
            if (Cesium.defined(picked) && picked.id && picked.id._sigedData) {
                const info = picked.id._sigedData;

                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({
                        type: "markerClick",
                        viewId: VIEW_ID,
                        idExtra: info.idExtra,
                        label: info.label,
                        lon: info.lon,
                        lat: info.lat,
                    }, "*");
                }
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

        return viewer;
    }

    function clearMarkers() {
        if (!viewer) return;
        viewer.entities.removeAll();
    }

    function colorFromHex(hex, fallback) {
        if (!hex || typeof hex !== "string" || !hex.trim()) {
            return fallback;
        }
        try {
            return Cesium.Color.fromCssColorString(hex);
        } catch (e) {
            console.warn("Cor inválida em marker:", hex, e);
            return fallback;
        }
    }

    function addMarkers(markers) {
        if (!viewer) return;

        const defaultColor = Cesium.Color.fromCssColorString("#ff6600");

        markers.forEach((m) => {
            const position = Cesium.Cartesian3.fromDegrees(m.lon, m.lat);
            const pinColor = colorFromHex(m.colorHex, defaultColor);

            pinBuilder.fromColor(pinColor, 48).then(function (canvas) {
                const entity = viewer.entities.add({
                    position: position,
                    billboard: {
                        image: canvas.toDataURL(),
                        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                        scale: 1.0,
                        disableDepthTestDistance: Number.POSITIVE_INFINITY,
                    },
                    label: m.label && m.label.length > 0
                        ? {
                        text: m.label,
                        font: "13px sans-serif",
                        fillColor: Cesium.Color.WHITE,
                        outlineColor: Cesium.Color.BLACK,
                        outlineWidth: 2,
                        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                        pixelOffset: new Cesium.Cartesian2(0, -50),
                        disableDepthTestDistance: Number.POSITIVE_INFINITY,
                    }
                        : undefined,
                });

                entity._sigedData = {
                    idExtra: m.idExtra || "",
                    label: m.label || "",
                    lon: m.lon,
                    lat: m.lat,
                };
            }).catch(function (e) {
                console.error("Erro ao gerar pin:", e);
            });
        });
    }

    function applyInitialCamera() {
        if (!viewer || !CFG) return;

        const h = (typeof CFG.height === "number" && CFG.height > 0)
            ? CFG.height
            : 3_000_000.0;

        // 👇 SEM animação
        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(
                CFG.lon || 0,
                CFG.lat || 0,
                h
            ),
        });
    }

    // -----------------------------------------------------------------------
    // Mensagens vindas do Flutter
    // -----------------------------------------------------------------------
    window.addEventListener("message", function (event) {
        const data = event.data;
        if (!data || typeof data !== "object") return;

        // Init enviado pelo iframe.onLoad do Flutter
        if (data.type === "initCesium") {
            VIEW_ID = data.viewId || null;

            CFG = {
                lon: Number(data.lon) || 0,
                lat: Number(data.lat) || 0,
                height: Number(data.height) || 3_000_000.0,
            };

            MARKERS = Array.isArray(data.markers) ? data.markers : [];

            const v = createViewerIfNeeded();
            clearMarkers();
            addMarkers(MARKERS);
            applyInitialCamera();
            return;
        }

        // Se o viewer ainda não existe, ignora o resto
        if (!viewer) return;

        // Controle de câmera vindo do Cesium3DController.flyTo (sem animação)
        if (data.type === "camera" &&
        data.method === "flyTo" &&
        (!data.viewId || data.viewId === VIEW_ID)) {

            const lon = (typeof data.lon === "number") ? data.lon : CFG.lon;
            const lat = (typeof data.lat === "number") ? data.lat : CFG.lat;
            const height = (typeof data.height === "number")
                ? data.height
                : CFG.height;

            viewer.camera.setView({
                destination: Cesium.Cartesian3.fromDegrees(lon, lat, height),
            });
        }

        // Atualização dinâmica de marcadores
        if (data.type === "updateMarkers" &&
        (!data.viewId || data.viewId === VIEW_ID) &&
        Array.isArray(data.markers)) {

            clearMarkers();
            MARKERS = data.markers;
            addMarkers(MARKERS);
        }
    });
</script>
</body>
</html>
